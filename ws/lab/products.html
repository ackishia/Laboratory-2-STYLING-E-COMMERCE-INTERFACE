<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Fashion Style</h1>
</header>

<main>
    <section aria-labelledby="product-list" id="product-container">
        <h2 id="product-list">Our Products</h2>
    </section>

    <aside>
        <h2>Filter Products</h2>
        <form>
            <fieldset>
                <legend>Category</legend>
                <input type="checkbox" id="clothes-filter">
                <label for="clothes-filter">Clothes</label><br>

                <input type="checkbox" id="shoes-filter">
                <label for="shoes-filter">Shoes</label><br>

                <input type="checkbox" id="bags-filter">
                <label for="bags-filter">Bags</label>
            </fieldset>

            <fieldset>
                <legend>Price Range</legend>
                <input type="radio" name="price" id="low">
                <label for="low">Below ₱1,500</label><br>

                <input type="radio" name="price" id="mid">
                <label for="mid">₱1,000 - ₱3,000</label><br>

                <input type="radio" name="price" id="high">
                <label for="high">Above ₱3,000</label>
            </fieldset>
        </form>
    </aside>
</main>

<script src="script.js"></script>

</body>
</html>
