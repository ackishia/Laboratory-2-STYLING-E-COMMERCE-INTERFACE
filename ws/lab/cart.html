<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Your Shopping Cart</h1>
    <h2 id="cart-total">Subtotal: Php.0</h2>

    <nav>
        <ul class="nav-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<main>

<section>
    <ul class="cart-items">
        <li>
            <img src="scarf brown bag.jpg" alt="scarf brown bag">
            <h3>Scarf Brown Bag</h3>
            <p>Php.499</p>
            <label>Qty:
                <input type="number" value="1" min="1">
            </label>
        </li>
    </ul>
</section>

<section>
    <h2>Subtotal: Php.2,698</h2>
    <a href="checkout.html" role="button">Proceed to Checkout</a>
</section>

<section>
    <p>Your cart is currently empty.</p>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
