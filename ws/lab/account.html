<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="style.css">
    </style>
</head>
<body>
<header>
    <h1>Account</h1>
</header>
<div class="wrapper">
    <div class="account-container">

        <main>
            <section>
                <h2>Login</h2>

                <form id="loginForm">
                    <fieldset>
                        <legend>Enter your account</legend>

                        <label for="username">Username:</label><br>
                        <input type="text" id="username" required><br><br>

                        <label for="password">Password:</label><br>
                        <input type="password" id="password" required><br><br>

                        <button type="submit">Login</button>
                    </fieldset>
                </form>
            </section>

            <section>
                <h2>Your Account</h2>

                <p><strong>Name:</strong> <span id="account-name">Guest</span></p>
                <p><strong>Status:</strong> <span id="account-status">Not logged in</span></p>
            </section>

        </main>

    </div>
</div>

<script src="script.js"></script>


</body>
</html>
